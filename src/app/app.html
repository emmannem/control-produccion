<div class="container mt-5">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">Sistema de Orden de Producción</div>

    <div class="card-body">
      <!-- Interpolación -->
      <h4>{{ orden.producto }}</h4>

      <p>Cantidad actual: {{ orden.cantidad }}</p>
      <p>Capacidad máquina: {{ orden.capacidadMaquina }}</p>

      <!-- Property Binding -->
      <p>
        Estado:
        <span
          class="badge"
          [ngClass]="{
            'bg-secondary': orden.estado === 'pendiente',
            'bg-warning': orden.estado === 'en_proceso',
            'bg-success': orden.estado === 'finalizada',
          }"
        >
          {{ orden.estado }}
        </span>
      </p>

      <!-- Two-way Binding -->
      <div class="mb-3">
        <label>Nueva Cantidad</label>
        <input type="number" class="form-control" [(ngModel)]="nuevaCantidad" />
      </div>

      <button class="btn btn-info me-2" (click)="actualizarCantidad()">Actualizar Cantidad</button>

      <!-- Event Binding -->
      <button class="btn btn-success me-2" (click)="iniciar()">Iniciar</button>

      <button
        class="btn btn-danger"
        [disabled]="orden.estado !== 'en_proceso'"
        (click)="finalizar()"
      >
        Finalizar
      </button>

      <!-- Implementación del bloque de control dee flujo @if-->
      @if (mensaje) {
        <div class="alert alert-warning mt-3">
          {{ mensaje }}
        </div>
      }

      <!-- Uso de método del modelo -->
      <p class="mt-3">
        Eficiencia:
        <strong>{{ orden.obtenerEficiencia() }}</strong>
      </p>
    </div>
  </div>
</div>
